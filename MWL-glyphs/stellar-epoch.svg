    <circle cx="256" cy="418" r="3" fill="#6c6c6c" opacity="0.2" />
    <circle cx="256" cy="418" r="1.5" fill="#cdcdcd" opacity="0.25" />
    <!-- Subtle connecting thread (time axis through the lifecycle) -->
    <circle cx="256" cy="198" r="1.5" fill="#fff7bf" opacity="0.3" />
    <circle cx="256" cy="244" r="1.3" fill="#ffc63d" opacity="0.25" />
    <circle cx="256" cy="290" r="1.2" fill="#ffcc40" opacity="0.2" />
    <circle cx="256" cy="332" r="1.1" fill="#ffe2a6" opacity="0.18" />
    <circle cx="256" cy="370" r="1.0" fill="#cdcdcd" opacity="0.15" />
    <circle cx="256" cy="404" r="0.9" fill="#6c6c6c" opacity="0.12" />
    <!-- Sparse background -->
    <circle cx="80" cy="80" r="1.2" fill="#cdcdcd" opacity="0.1" />
    <circle cx="430" cy="100" r="1.0" fill="#cdcdcd" opacity="0.08" />
